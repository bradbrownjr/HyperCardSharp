name: Release

'on':
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: Build (${{ matrix.artifact-name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact-name: HyperCardSharp-windows-x64
          - os: macos-15-intel
            rid: osx-x64
            artifact-name: HyperCardSharp-macos-intel
          - os: macos-latest
            rid: osx-arm64
            artifact-name: HyperCardSharp-macos-arm64
          - os: ubuntu-latest
            rid: linux-x64
            artifact-name: HyperCardSharp-linux-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test --no-restore --configuration Release

      - name: Publish
        run: >
          dotnet publish src/HyperCardSharp.App/HyperCardSharp.App.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ github.event.inputs.version }}
          --output publish

      - name: Set executable bit (Unix)
        if: runner.os != 'Windows'
        run: chmod +x publish/HyperCardSharp.App

      - name: Zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path publish\* -DestinationPath "${{ matrix.artifact-name }}.zip"

      - name: Zip (Unix)
        if: runner.os != 'Windows'
        run: zip -r "${{ matrix.artifact-name }}.zip" publish/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-name }}.zip
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: HyperCardSharp ${{ github.event.inputs.version }}
          prerelease: ${{ github.event.inputs.prerelease }}
          generate_release_notes: true
          files: artifacts/*.zip
